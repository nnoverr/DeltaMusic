<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DeltaMusic</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet">
    <style>
        :root {
            --bg-gradient-top: #050505;
            --bg-gradient-bottom: #1A0B2E;
            --accent-pink: #E94057;
            --accent-purple: #8A2387;
            --accent-orange: #F27121;
            --surface-color: rgba(255, 255, 255, 0.05);
            --surface-border: rgba(255, 255, 255, 0.1);
            --text-primary: #FFFFFF;
            --text-secondary: #B3B3B3;
            --nav-height: 70px;
            --border-radius: 24px;
            --transition-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background: linear-gradient(180deg, var(--bg-gradient-top) 0%, var(--bg-gradient-bottom) 100%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .hidden {
            display: none !important;
        }

        .content-container {
            padding-bottom: calc(var(--nav-height) + 120px);
            width: 100%;
        }

        .screen {
            display: none;
            padding: 0 16px;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: block;
        }

        .sub-screen {
            display: none;
            animation: fadeIn 0.2s ease;
        }

        .sub-screen.active {
            display: block;
        }

        .screen-padding-top {
            padding-top: 48px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 48px 8px 16px 8px;
        }

        .screen-title {
            font-size: 36px;
            font-weight: 700;
        }

        .delta-logo {
            font-size: 36px;
            font-weight: bold;
            color: var(--accent-pink);
            transform: rotate(33deg);
            animation: logoPulse 4s infinite alternate linear;
        }

        @keyframes logoPulse {
            0% {
                color: var(--accent-pink);
            }

            100% {
                color: #9C27B0;
            }
        }

        .library-tabs-scroll {
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 16px;
            scrollbar-width: none;
        }

        .library-tabs-scroll::-webkit-scrollbar {
            display: none;
        }

        .library-sub-tabs {
            display: flex;
            gap: 8px;
            align-items: center;
            white-space: nowrap;
        }

        .sub-tab-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: var(--border-radius);
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition-speed);
            cursor: pointer;
        }

        .sub-tab-btn.active {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--text-primary);
        }

        .icon-button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }

        .icon-button.active {
            color: var(--accent-pink);
        }

        .search-input-wrapper {
            position: relative;
            margin-bottom: 16px;
        }

        .search-input-wrapper input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
            padding: 14px 16px 14px 48px;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .track-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .track-row {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--border-radius);
            padding: 12px;
            cursor: pointer;
        }

        .track-cover {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .gradient-cover {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
        }

        .gradient-cover.online {
            background: linear-gradient(135deg, #1A2980, #26D0CE);
        }

        .track-info {
            flex: 1;
            margin-left: 14px;
            overflow: hidden;
        }

        .track-title {
            font-size: 16px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .track-action {
            padding: 8px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .color-pink {
            color: var(--accent-pink);
        }

        .color-red {
            color: #E57373;
        }

        .artist-group {
            margin-bottom: 24px;
        }

        .artist-group-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .artist-group-avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: var(--surface-color);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .artist-group-name {
            margin-left: 16px;
            font-size: 18px;
            font-weight: 600;
        }

        .artist-media-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--border-radius);
            overflow: hidden;
            margin-bottom: 16px;
        }

        .artist-media-photo {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: var(--surface-color);
        }

        .artist-media-content {
            padding: 16px;
        }

        .artist-media-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .chart-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 50vh;
            gap: 20px;
        }

        .chart-play-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 4px solid rgba(233, 64, 87, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            animation: chartGlow 2s infinite alternate ease-in-out;
        }

        @keyframes chartGlow {
            0% {
                border-color: rgba(233, 64, 87, 0.5);
                box-shadow: 0 0 30px rgba(233, 64, 87, 0.2);
            }

            100% {
                border-color: rgba(156, 39, 176, 0.5);
                box-shadow: 0 0 30px rgba(156, 39, 176, 0.2);
            }
        }

        .player-widget {
            position: fixed;
            bottom: calc(var(--nav-height) + 16px);
            left: 16px;
            right: 16px;
            z-index: 100;
        }

        .player-mini {
            background: rgba(20, 8, 40, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid var(--surface-border);
            border-radius: var(--border-radius);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .player-mini-info {
            flex: 1;
            overflow: hidden;
        }

        .player-title {
            font-size: 16px;
            font-weight: 600;
            white-space: nowrap;
        }

        .player-artist {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .player-full {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(25px);
            z-index: 1000;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
        }

        .player-full-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-full-cover {
            width: 280px;
            height: 280px;
            border-radius: 32px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            margin: 40px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(233, 64, 87, 0.3);
            overflow: hidden;
        }

        .player-full-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-full-info {
            text-align: center;
            margin-bottom: 40px;
        }

        .player-title-large {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .player-artist-large {
            font-size: 18px;
            color: var(--text-secondary);
        }

        .seekbar {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
        }

        .seekbar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-pink);
        }

        .time-displays {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .player-full-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-top: auto;
        }

        .play-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--accent-pink);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(233, 64, 87, 0.4);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            border-top: 1px solid var(--surface-border);
            z-index: 500;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            background: none;
            border: none;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--accent-pink);
        }

        .nav-label {
            font-size: 11px;
            margin-top: 4px;
            font-weight: 500;
        }

        #import-input {
            width: 100%;
            height: 150px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            color: #fff;
            padding: 16px;
            font-family: inherit;
            resize: none;
            outline: none;
        }

        .executor-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .exec-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--surface-border);
            border-radius: 12px;
            color: #fff;
            padding: 14px;
            outline: none;
        }

        #global-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 2000;
            backdrop-filter: blur(10px);
            font-size: 14px;
        }

        .loading-spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-pink);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="content-container">
        <!-- LIBRARY SCREEN -->
        <div id="screen-library" class="screen active">
            <div class="library-header">
                <h1 class="screen-title">Library</h1>
                <div class="delta-logo">Δ</div>
            </div>

            <div class="library-tabs-scroll">
                <div class="library-sub-tabs">
                    <button class="sub-tab-btn active" data-subtab="tracks">Tracks</button>
                    <button class="sub-tab-btn" data-subtab="artists">Artists</button>
                    <button class="sub-tab-btn" data-subtab="foryou">For You</button>
                    <button class="sub-tab-btn" data-subtab="yourchart">Your Chart</button>
                    <button class="sub-tab-btn" data-subtab="online">Online</button>
                    <div style="flex:1"></div>
                    <button class="icon-button" id="btn-toggle-shuffle">
                        <span class="material-symbols-outlined">shuffle</span>
                    </button>
                </div>
            </div>

            <div id="library-search-container" class="search-input-wrapper hidden">
                <span class="material-symbols-outlined search-icon">search</span>
                <input type="text" id="library-search-input" placeholder="Search DeltaMusic Online...">
            </div>

            <div id="subtab-tracks" class="sub-screen active">
                <div id="local-tracks-list" class="track-list"></div>
            </div>
            <div id="subtab-artists" class="sub-screen">
                <div id="artists-list"></div>
            </div>
            <div id="subtab-foryou" class="sub-screen">
                <div id="foryou-list" class="track-list"></div>
            </div>
            <div id="subtab-yourchart" class="sub-screen">
                <div class="chart-container">
                    <div class="chart-play-button" id="btn-play-chart">
                        <span class="material-symbols-outlined"
                            style="font-size: 48px; color: var(--accent-pink);">shuffle</span>
                    </div>
                    <p style="font-weight: bold; font-size: 18px;">Play Your Chart</p>
                    <div class="chart-spinner loading-spinner hidden"></div>
                </div>
            </div>
            <div id="subtab-online" class="sub-screen">
                <div id="online-results-list" class="track-list"></div>
            </div>
        </div>

        <!-- DOWNLOAD SCREEN -->
        <div id="screen-download" class="screen">
            <h1 class="screen-title screen-padding-top">Import</h1>
            <p style="color:var(--text-secondary); margin-bottom: 20px;">Paste Yandex Music HTML or track list (Artist -
                Title)</p>
            <textarea id="import-input" placeholder="Paste data here..."></textarea>
            <button id="btn-run-import" class="accent-btn" style="margin-top: 16px;">
                <span class="material-symbols-outlined">cloud_download</span>
                Start Import
            </button>

            <div id="import-status" class="hidden"
                style="margin-top: 20px; display: flex; align-items: center; gap:12px;">
                <div class="loading-spinner"></div>
                <span id="import-status-text">Processing...</span>
            </div>
            <div id="import-progress-container" class="hidden"
                style="width:100%; height:4px; background:rgba(255,255,255,0.1); margin-top:10px; border-radius:2px; overflow:hidden;">
                <div id="import-progress-fill"
                    style="width:0%; height:100%; background:var(--accent-pink); transition: width 0.3s;"></div>
            </div>
            <div id="import-results" style="margin-top: 20px;" class="track-list"></div>
        </div>

        <!-- EXECUTOR SCREEN -->
        <div id="screen-executor" class="screen">
            <h1 class="screen-title screen-padding-top">Admin</h1>
            <p style="color:var(--text-secondary); margin-bottom: 24px;">Upload track to Google Sheets database.</p>

            <div class="executor-form">
                <input type="text" id="exec-artist" class="exec-input" placeholder="Artist Name">
                <input type="password" id="exec-password" class="exec-input" placeholder="Secret Key">
                <input type="text" id="exec-photo" class="exec-input" placeholder="Photo URL (Optional)">
                <input type="text" id="exec-title" class="exec-input" placeholder="Track Title">
                <input type="text" id="exec-url" class="exec-input" placeholder="MP3 Link">
                <button id="btn-run-executor" class="accent-btn" style="margin-top:10px">
                    <span class="material-symbols-outlined">upload_file</span>
                    Upload Track
                </button>
            </div>
            <div id="exec-status"
                style="margin-top:12px; font-size:14px; text-align:center; padding:10px; border-radius:8px;"
                class="hidden"></div>
            <div id="executor-results" style="margin-top:20px; opacity:0.7"></div>
        </div>
    </div>

    <!-- PLAYER UI -->
    <div class="player-widget">
        <div id="player-mini" class="player-mini hidden">
            <div class="player-mini-info">
                <div id="mini-title" class="player-title">Not Playing</div>
                <div id="mini-artist" class="player-artist">DeltaMusic</div>
            </div>
            <button id="btn-mini-play" class="icon-button"><span id="icon-mini-play"
                    class="material-symbols-outlined">play_arrow</span></button>
        </div>
    </div>

    <div id="player-full" class="player-full hidden">
        <div class="player-full-header">
            <button id="btn-full-collapse" class="icon-button color-pink"><span
                    class="material-symbols-outlined">keyboard_arrow_down</span></button>
            <button id="btn-full-close" class="icon-button"><span
                    class="material-symbols-outlined">close</span></button>
        </div>
        <div class="player-full-cover" id="full-cover-container">
            <span class="material-symbols-outlined" style="font-size: 80px; opacity: 0.3;">music_note</span>
        </div>
        <div class="player-full-info">
            <div id="full-title" class="player-title-large">Not Playing</div>
            <div id="full-artist" class="player-artist-large">DeltaMusic</div>
        </div>
        <div class="player-seekbar-container">
            <input type="range" id="player-seekbar" class="seekbar" value="0" min="0" max="100">
            <div class="time-displays">
                <span id="time-current">0:00</span>
                <span id="time-duration">0:00</span>
            </div>
        </div>
        <div class="player-full-controls">
            <button id="btn-full-prev" class="icon-button"><span class="material-symbols-outlined"
                    style="font-size: 40px;">skip_previous</span></button>
            <button id="btn-full-play" class="play-btn"><span id="icon-full-play" class="material-symbols-outlined"
                    style="font-size: 48px; color: #fff;">play_arrow</span></button>
            <button id="btn-full-next" class="icon-button"><span class="material-symbols-outlined"
                    style="font-size: 40px;">skip_next</span></button>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-target="screen-library">
            <span class="material-symbols-outlined">library_music</span>
            <span class="nav-label">Library</span>
        </button>
        <button class="nav-item" data-target="screen-download">
            <span class="material-symbols-outlined">cloud_download</span>
            <span class="nav-label">Import</span>
        </button>
        <button class="nav-item" data-target="screen-executor">
            <span class="material-symbols-outlined">admin_panel_settings</span>
            <span class="nav-label">Admin</span>
        </button>
    </nav>

    <div id="global-toast" class="hidden"></div>
    <audio id="audio-player" preload="metadata"></audio>

    <script>
        const CONFIG = {
            PROXY: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                ? "/api/proxy?url="
                : "https://corsproxy.io/?",
            SCRIPT_URL: "https://script.google.com/macros/s/AKfycbw0d4RGncqnwKla0E7YK06xyAD2He5-w-08DZ1QvkbEofRnEg8pv73jLDtdJaXBbucrFA/exec",
            DB_NAME: "DeltaMusicDB",
            DB_VERSION: 3,
            STORE_NAME: "tracks"
        };

        let db;
        let playlist = [];
        let curIdx = -1;
        let isShuffle = false;
        let blobUrl = null;

        const UI = {
            navItems: document.querySelectorAll('.nav-item'),
            screens: document.querySelectorAll('.screen'),
            toast: document.getElementById('global-toast'),
            library: {
                tabs: document.querySelectorAll('.sub-tab-btn'),
                subScreens: document.querySelectorAll('.sub-screen'),
                lists: {
                    tracks: document.getElementById('local-tracks-list'),
                    artists: document.getElementById('artists-list'),
                    foryou: document.getElementById('foryou-list'),
                    online: document.getElementById('online-results-list')
                },
                search: {
                    container: document.getElementById('library-search-container'),
                    input: document.getElementById('library-search-input')
                },
                btnShuffle: document.getElementById('btn-toggle-shuffle'),
                btnChart: document.getElementById('btn-play-chart'),
                chartSpinner: document.querySelector('.chart-spinner')
            },
            player: {
                audio: document.getElementById('audio-player'),
                mini: document.getElementById('player-mini'),
                full: document.getElementById('player-full'),
                miniTitle: document.getElementById('mini-title'),
                miniArtist: document.getElementById('mini-artist'),
                fullTitle: document.getElementById('full-title'),
                fullArtist: document.getElementById('full-artist'),
                btnMiniPlay: document.getElementById('btn-mini-play'),
                iconMiniPlay: document.getElementById('icon-mini-play'),
                btnFullPlay: document.getElementById('btn-full-play'),
                iconFullPlay: document.getElementById('icon-full-play'),
                seekbar: document.getElementById('player-seekbar'),
                timeCurrent: document.getElementById('time-current'),
                timeDuration: document.getElementById('time-duration')
            }
        };

        // --- DATABASE ---
        function initDB() {
            return new Promise((res, rej) => {
                const req = indexedDB.open(CONFIG.DB_NAME, CONFIG.DB_VERSION);
                req.onupgradeneeded = (e) => {
                    const d = e.target.result;
                    if (!d.objectStoreNames.contains(CONFIG.STORE_NAME)) {
                        const s = d.createObjectStore(CONFIG.STORE_NAME, { keyPath: 'id' });
                        s.createIndex('artist', 'artist', { unique: false });
                    }
                };
                req.onsuccess = (e) => { db = e.target.result; res(); };
                req.onerror = rej;
            });
        }
        function getAllTracks() {
            return new Promise(res => {
                const tx = db.transaction(CONFIG.STORE_NAME, 'readonly');
                const req = tx.objectStore(CONFIG.STORE_NAME).getAll();
                req.onsuccess = () => res(req.result || []);
            });
        }
        function saveTrack(t) {
            return new Promise(res => {
                const tx = db.transaction(CONFIG.STORE_NAME, 'readwrite');
                tx.objectStore(CONFIG.STORE_NAME).put(t);
                tx.oncomplete = () => res();
            });
        }
        function deleteTrack(id) {
            return new Promise(res => {
                const tx = db.transaction(CONFIG.STORE_NAME, 'readwrite');
                tx.objectStore(CONFIG.STORE_NAME).delete(id);
                tx.oncomplete = () => res();
            });
        }

        // --- TOAST ---
        function showToast(msg) {
            UI.toast.textContent = msg;
            UI.toast.classList.remove('hidden');
            setTimeout(() => UI.toast.classList.add('hidden'), 3000);
        }

        // --- NAVIGATION ---
        UI.navItems.forEach(item => {
            item.addEventListener('click', () => {
                UI.navItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                UI.screens.forEach(s => s.classList.remove('active'));
                document.getElementById(item.dataset.target).classList.add('active');
                if (item.dataset.target === 'screen-library') loadTracks();
            });
        });

        UI.library.tabs.forEach(btn => {
            btn.addEventListener('click', () => {
                UI.library.tabs.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                UI.library.subScreens.forEach(s => s.classList.remove('active'));
                document.getElementById(`subtab-${btn.dataset.subtab}`).classList.add('active');

                UI.library.search.container.classList.toggle('hidden', btn.dataset.subtab !== 'online');

                if (btn.dataset.subtab === 'online' && !UI.library.lists.online.hasChildNodes()) searchOnline("");
                if (btn.dataset.subtab === 'tracks') loadTracks();
                if (btn.dataset.subtab === 'artists') loadArtists();
                if (btn.dataset.subtab === 'foryou') loadForYou();
            });
        });

        // --- LOGIC ---
        async function loadTracks() {
            const tracks = await getAllTracks();
            const sorted = tracks.sort((a, b) => a.artist.localeCompare(b.artist));
            UI.library.lists.tracks.innerHTML = sorted.length ? '' : '<div style="text-align:center; padding:40px; opacity:0.5;">No tracks in library</div>';
            sorted.forEach((t, i) => {
                UI.library.lists.tracks.appendChild(createRow(t, false, () => playList(sorted, i), async (e) => {
                    e.stopPropagation();
                    if (confirm('Delete?')) { await deleteTrack(t.id); loadTracks(); showToast('Deleted'); }
                }));
            });
        }

        async function loadArtists() {
            const tracks = await getAllTracks();
            const cont = UI.library.lists.artists;
            cont.innerHTML = '';
            const map = {};
            tracks.forEach(t => { if (!map[t.artist]) map[t.artist] = []; map[t.artist].push(t); });
            Object.keys(map).sort().forEach(art => {
                const g = document.createElement('div'); g.className = 'artist-group';
                g.innerHTML = `<div class="artist-group-header"><div class="artist-group-avatar"><span class="material-symbols-outlined">person</span></div><div class="artist-group-name">${art}</div></div>`;
                map[art].forEach((t, i) => g.appendChild(createRow(t, false, () => playList(map[art], i))));
                cont.appendChild(g);
            });
        }

        async function loadForYou() {
            const cont = UI.library.lists.foryou;
            if (cont.hasChildNodes()) return;
            cont.innerHTML = '<div style="display:flex; justify-content:center; padding:40px;"><div class="loading-spinner"></div></div>';
            try {
                const res = await fetch(`${CONFIG.SCRIPT_URL}?action=getCards`);
                const data = await res.json();
                cont.innerHTML = '';
                data.sort(() => 0.5 - Math.random()).forEach(item => {
                    const card = document.createElement('div'); card.className = 'artist-media-card';
                    const photo = (item.photos && item.photos.length) ? item.photos[item.photos.length - 1] : null;
                    const photoHtml = photo ? `<img src="${photo}" class="artist-media-photo">` : `<div class="artist-media-photo" style="display:flex; align-items:center; justify-content:center;"><span class="material-symbols-outlined" style="font-size:48px; opacity:0.3;">person</span></div>`;
                    let rows = '';
                    item.tracks.forEach(t => {
                        rows += `<div class="track-row" onclick="playRemote('${t.title.replace(/'/g, "")}', '${item.name.replace(/'/g, "")}', '${t.url}')">
                            <div class="track-cover gradient-cover online"><span class="material-symbols-outlined">public</span></div>
                            <div class="track-info"><div class="track-title">${t.title}</div><div class="track-artist">${item.name}</div></div>
                            <button class="track-action color-pink"><span class="material-symbols-outlined">cloud_download</span></button>
                        </div>`;
                    });
                    card.innerHTML = `${photoHtml}<div class="artist-media-content"><div class="artist-media-title">${item.name}</div><div class="track-list">${rows}</div></div>`;
                    cont.appendChild(card);
                });
            } catch (e) { cont.innerHTML = 'Error loading recommendations'; }
        }

        async function searchOnline(q) {
            UI.library.lists.online.innerHTML = '<div style="display:flex; justify-content:center; padding:40px;"><div class="loading-spinner"></div></div>';
            try {
                const res = await fetchMuzofond(q);
                UI.library.lists.online.innerHTML = '';
                res.forEach((t, i) => {
                    UI.library.lists.online.appendChild(createRow(t, true, () => playList(res, i), (e) => { e.stopPropagation(); dlSave(t); }));
                });
            } catch (e) { UI.library.lists.online.innerHTML = 'Search error'; }
        }

        async function fetchMuzofond(q) {
            const target = q ? `https://muzofond.fm/search/${encodeURIComponent(q)}` : `https://muzofond.fm/`;
            const html = await fetch(CONFIG.PROXY + encodeURIComponent(target)).then(r => r.text());
            const items = [];
            const blocks = html.split('<li class="item"');
            for (let i = 1; i < blocks.length; i++) {
                const b = blocks[i];
                const u = /data-url="([^"]+)"/.exec(b), a = /<span class="artist">([^<]+)<\/span>/.exec(b), t = /<span class="track">([^<]+)<\/span>/.exec(b);
                if (u && a && t) items.push({ id: 'net_' + Math.random().toString(36).slice(2), title: t[1].trim(), artist: a[1].trim(), filePath: u[1], isOnline: true });
            }
            return items;
        }

        async function dlSave(t) {
            showToast(`Downloading: ${t.title}...`);
            try {
                const blob = await fetch(CONFIG.PROXY + encodeURIComponent(t.filePath)).then(r => r.blob());
                await saveTrack({ id: 'loc_' + Date.now(), title: t.title, artist: t.artist, filePath: t.filePath, blob });
                showToast(`Saved ${t.title}`);
                if (document.getElementById('subtab-tracks').classList.contains('active')) loadTracks();
            } catch (e) { showToast('Download failed'); }
        }

        function playRemote(t, a, u) {
            const track = { id: 'tmp', title: t, artist: a, filePath: u, isOnline: true };
            playList([track], 0);
            dlSave(track);
        }

        function createRow(t, online, onClick, onAction) {
            const r = document.createElement('div'); r.className = 'track-row'; r.onclick = onClick;
            const icon = online ? 'public' : 'music_note';
            const bg = online ? 'gradient-cover online' : 'gradient-cover';
            const action = online ? '<button class="track-action color-pink"><span class="material-symbols-outlined">cloud_download</span></button>' : '<button class="track-action color-red"><span class="material-symbols-outlined">delete</span></button>';
            r.innerHTML = `<div class="track-cover ${bg}"><span class="material-symbols-outlined">${icon}</span></div><div class="track-info"><div class="track-title">${t.title}</div><div class="track-artist">${t.artist}</div></div>${action}`;
            const btn = r.querySelector('.track-action');
            if (btn) btn.onclick = onAction;
            return r;
        }

        // --- PLAYER ---
        const audio = UI.player.audio;
        function playList(list, i) { playlist = list; curIdx = i; playCur(); }
        async function playCur() {
            const t = playlist[curIdx];
            UI.player.miniTitle.textContent = UI.player.fullTitle.textContent = t.title;
            UI.player.miniArtist.textContent = UI.player.fullArtist.textContent = t.artist;
            UI.player.mini.classList.remove('hidden');
            if (blobUrl) URL.revokeObjectURL(blobUrl);
            if (t.blob) { blobUrl = URL.createObjectURL(t.blob); audio.src = blobUrl; }
            else { audio.src = CONFIG.PROXY + encodeURIComponent(t.filePath); }
            audio.play().catch(() => { });
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({ title: t.title, artist: t.artist });
            }
        }
        function playNext() { curIdx = isShuffle ? Math.floor(Math.random() * playlist.length) : (curIdx + 1) % playlist.length; playCur(); }
        function playPrev() { curIdx = (curIdx - 1 + playlist.length) % playlist.length; playCur(); }

        audio.ontimeupdate = () => { if (audio.duration) { UI.player.seekbar.value = (audio.currentTime / audio.duration) * 100; UI.player.timeCurrent.textContent = fmt(audio.currentTime); } };
        audio.onloadedmetadata = () => { UI.player.timeDuration.textContent = fmt(audio.duration); };
        audio.onended = playNext;
        UI.player.seekbar.oninput = (e) => { if (audio.duration) audio.currentTime = audio.duration * (e.target.value / 100); };

        const toggle = () => audio.paused ? audio.play() : audio.pause();
        UI.player.btnMiniPlay.onclick = (e) => { e.stopPropagation(); toggle(); };
        UI.player.btnFullPlay.onclick = toggle;
        document.getElementById('btn-full-next').onclick = playNext;
        document.getElementById('btn-full-prev').onclick = playPrev;

        audio.onplay = () => UI.player.iconMiniPlay.textContent = UI.player.iconFullPlay.textContent = 'pause';
        audio.onpause = () => UI.player.iconMiniPlay.textContent = UI.player.iconFullPlay.textContent = 'play_arrow';

        UI.player.mini.onclick = () => UI.player.full.classList.remove('hidden');
        document.getElementById('btn-full-collapse').onclick = () => UI.player.full.classList.add('hidden');
        document.getElementById('btn-full-close').onclick = () => { audio.pause(); audio.src = ''; UI.player.mini.classList.add('hidden'); UI.player.full.classList.add('hidden'); };

        function fmt(s) { const m = Math.floor(s / 60), sec = Math.floor(s % 60); return m + ':' + (sec < 10 ? '0' : '') + sec; }

        // --- IMPORT ---
        document.getElementById('btn-run-import').onclick = async () => {
            const val = document.getElementById('import-input').value.trim();
            if (!val) return;
            const log = document.getElementById('import-results'); log.innerHTML = '';
            const status = document.getElementById('import-status'); status.classList.remove('hidden');
            const prog = document.getElementById('import-progress-container'); prog.classList.remove('hidden');
            const fill = document.getElementById('import-progress-fill'); fill.style.width = '0%';

            let list = [];
            if (val.includes('data-title="')) {
                const re = /data-title="(.*?)".*?data-artist="(.*?)"/g; let m;
                while ((m = re.exec(val))) list.push({ title: m[1].trim(), artist: m[2].trim() });
            } else {
                val.split('\n').filter(l => l.trim()).forEach(l => {
                    const p = l.split('-'); if (p.length >= 2) list.push({ artist: p[0].trim(), title: p.slice(1).join('-').trim() });
                });
            }
            document.getElementById('btn-run-import').disabled = true;
            for (let i = 0; i < list.length; i++) {
                const q = `${list[i].artist} ${list[i].title}`;
                document.getElementById('import-status-text').textContent = `Processing (${i + 1}/${list.length})`;
                const res = await fetchMuzofond(q);
                if (res.length) { await dlSave(res[0]); log.innerHTML += `<div style="font-size:12px; opacity:0.7;">✓ Saved: ${res[0].artist} - ${res[0].title}</div>`; }
                else { log.innerHTML += `<div style="font-size:12px; color:#E57373;">✗ Not found: ${q}</div>`; }
                fill.style.width = `${((i + 1) / list.length) * 100}%`;
                await new Promise(r => setTimeout(r, 800));
            }
            document.getElementById('btn-run-import').disabled = false;
            status.classList.add('hidden');
        };

        // --- EXECUTOR ---
        document.getElementById('btn-run-executor').onclick = async () => {
            const b = document.getElementById('btn-run-executor'); b.disabled = true;
            const resEl = document.getElementById('executor-results');
            const msg = (s, ok) => {
                const st = document.getElementById('exec-status'); st.textContent = s; st.className = ok ? 'hidden' : '';
                st.style.background = ok ? 'rgba(76,175,80,0.2)' : 'rgba(244,67,54,0.2)';
                st.style.color = ok ? '#81C784' : '#E57373'; st.classList.remove('hidden');
                resEl.innerHTML = `<div style="font-size:12px; color:${ok ? '#81C784' : '#E57373'}">[${new Date().toLocaleTimeString()}] ${s}</div>` + resEl.innerHTML;
            };
            try {
                const payload = {
                    action: 'upload',
                    artist: document.getElementById('exec-artist').value.trim(),
                    password: document.getElementById('exec-password').value.trim(),
                    photoUrl: document.getElementById('exec-photo').value.trim(),
                    title: document.getElementById('exec-title').value.trim(),
                    url: document.getElementById('exec-url').value.trim()
                };
                const res = await fetch(CONFIG.SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
                const text = await res.text();
                if (text.includes('Success')) { msg("Success!", true); document.getElementById('exec-title').value = ''; document.getElementById('exec-url').value = ''; }
                else msg(text, false);
            } catch (e) { msg("Error", false); }
            b.disabled = false;
        };

        // --- INIT ---
        initDB().then(() => loadTracks());
        let deb; document.getElementById('library-search-input').oninput = (e) => { clearTimeout(deb); deb = setTimeout(() => searchOnline(e.target.value.trim()), 1000); };
        document.getElementById('btn-toggle-shuffle').onclick = () => { isShuffle = !isShuffle; UI.library.btnShuffle.classList.toggle('active', isShuffle); };
        document.getElementById('btn-play-chart').onclick = async () => {
            UI.library.chartSpinner.classList.remove('hidden');
            const res = await fetchMuzofond("");
            UI.library.chartSpinner.classList.add('hidden');
            const s = res.sort(() => 0.5 - Math.random()).slice(0, 20);
            if (s.length) { playList(s, 0); showToast("Playing Your Chart"); }
        };
    </script>
</body>

</html>
