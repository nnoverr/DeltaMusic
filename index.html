<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DeltaMusic</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="content-container">
        <!-- LIBRARY SCREEN -->
        <div id="screen-library" class="screen active">
            <div class="library-header">
                <h1 class="screen-title">Library</h1>
                <div class="delta-logo">Δ</div>
            </div>

            <div class="library-tabs-scroll">
                <div class="library-sub-tabs">
                    <button class="sub-tab-btn active" data-subtab="tracks" id="subtab-tracks-btn">Tracks</button>
                    <button class="sub-tab-btn" data-subtab="artists">Artists</button>
                    <button class="sub-tab-btn" data-subtab="foryou">For You</button>
                    <button class="sub-tab-btn" data-subtab="online">Online</button>
                    <button id="btn-toggle-shuffle" class="icon-button"><span
                            class="material-symbols-outlined">shuffle</span></button>
                </div>
            </div>

            <div id="library-search-container" class="search-input-wrapper hidden" style="margin-top: 8px;">
                <span class="material-symbols-outlined search-icon">search</span>
                <input type="text" id="library-search-input" placeholder="Search Hitmotop...">
            </div>

            <div id="subtab-tracks" class="sub-screen active">
                <div id="local-tracks-list" class="track-list"></div>
            </div>

            <div id="subtab-artists" class="sub-screen">
                <div id="artists-list" class="track-list"></div>
            </div>

            <div id="subtab-foryou" class="sub-screen">
                <div id="foryou-list" class="track-list"></div>
            </div>

            <div id="subtab-online" class="sub-screen">
                <div class="chart-container" id="chart-view">
                    <div id="btn-play-chart" class="chart-play-button">
                        <span class="material-symbols-outlined" style="font-size: 80px;">play_arrow</span>
                        <div class="chart-spinner hidden"
                            style="position:absolute; width:220px; height:220px; border:4px solid var(--accent-pink); border-top-color:transparent; border-radius:50%; animation:spin 1s linear infinite;">
                        </div>
                    </div>
                    <div style="text-align:center;">
                        <h2 style="font-size:24px; margin-bottom:8px;">Your Chart</h2>
                        <p style="color:var(--text-secondary);">Daily mix of top tracks</p>
                    </div>
                </div>
                <div id="online-results-list" class="track-list"></div>
            </div>
        </div>

        <!-- DOWNLOAD/IMPORT SCREEN -->
        <div id="screen-download" class="screen">
            <h1 class="screen-title screen-padding-top">Import</h1>
            <p style="color:var(--text-secondary); margin-bottom: 24px;">Paste track list or Yandex Music HTML.</p>

            <textarea id="import-input" placeholder="Artist - Title&#10;Artist - Title"></textarea>

            <button id="btn-run-import" class="accent-btn" style="width:100%; margin-top:20px; height:56px;">
                <span class="material-symbols-outlined">cloud_download</span>
                Start Import
            </button>

            <div id="import-status"
                style="margin-top:20px; display:flex; align-items:center; gap:12px; font-weight:500;" class="hidden">
                <div class="loading-spinner" style="width:20px; height:20px; border-width:2px;"></div>
                <span id="import-status-text">Processing...</span>
            </div>
            <div id="import-progress-container" class="hidden"
                style="width:100%; height:4px; background:rgba(255,255,255,0.1); margin-top:10px; border-radius:2px; overflow:hidden;">
                <div id="import-progress-fill"
                    style="width:0%; height:100%; background:var(--accent-pink); transition: width 0.3s;"></div>
            </div>
            <div id="import-results" style="margin-top: 20px;" class="track-list"></div>
        </div>

        <!-- EXECUTOR SCREEN -->
        <div id="screen-executor" class="screen">
            <h1 class="screen-title screen-padding-top">Admin</h1>
            <p style="color:var(--text-secondary); margin-bottom: 24px;">Upload track to Google Sheets database.</p>

            <div class="executor-form">
                <input type="text" id="exec-artist" class="exec-input" placeholder="Artist Name">
                <input type="password" id="exec-password" class="exec-input" placeholder="Secret Key">
                <input type="text" id="exec-photo" class="exec-input" placeholder="Photo URL (Optional)">
                <input type="text" id="exec-title" class="exec-input" placeholder="Track Title">
                <input type="text" id="exec-url" class="exec-input" placeholder="MP3 Link">
                <button id="btn-run-executor" class="accent-btn" style="margin-top:10px">
                    <span class="material-symbols-outlined">upload_file</span>
                    Upload Track
                </button>
            </div>
            <div id="exec-status"
                style="margin-top:12px; font-size:14px; text-align:center; padding:10px; border-radius:8px;"
                class="hidden"></div>
            <div id="executor-results" style="margin-top:20px; opacity:0.7"></div>
        </div>
    </div>

    <!-- PLAYER UI -->
    <div class="player-widget">
        <div id="player-mini" class="player-mini hidden">
            <div class="player-mini-info">
                <div id="mini-title" class="player-title">Not Playing</div>
                <div id="mini-artist" class="player-artist">DeltaMusic</div>
            </div>
            <button id="btn-mini-play" class="icon-button"><span id="icon-mini-play"
                    class="material-symbols-outlined">play_arrow</span></button>
        </div>
    </div>

    <div id="player-full" class="player-full hidden">
        <div class="player-full-header">
            <button id="btn-full-collapse" class="icon-button color-pink"><span
                    class="material-symbols-outlined">keyboard_arrow_down</span></button>
            <button id="btn-full-close" class="icon-button"><span
                    class="material-symbols-outlined">close</span></button>
        </div>
        <div class="player-full-cover" id="full-cover-container">
            <span class="material-symbols-outlined" style="font-size: 80px; opacity: 0.3;">music_note</span>
        </div>
        <div class="player-full-info">
            <div id="full-title" class="player-title-large">Not Playing</div>
            <div id="full-artist" class="player-artist-large">DeltaMusic</div>
        </div>
        <div class="player-seekbar-container">
            <input type="range" id="player-seekbar" class="seekbar" value="0" min="0" max="100">
            <div class="time-displays">
                <span id="time-current">0:00</span>
                <span id="time-duration">0:00</span>
            </div>
        </div>
        <div class="player-full-controls">
            <button id="btn-full-like" class="icon-button"><span id="icon-full-like" class="material-symbols-outlined"
                    style="font-size: 32px;">favorite</span></button>
            <button id="btn-full-prev" class="icon-button"><span class="material-symbols-outlined"
                    style="font-size: 40px;">skip_previous</span></button>
            <button id="btn-full-play" class="play-btn"><span id="icon-full-play" class="material-symbols-outlined"
                    style="font-size: 48px; color: #fff;">play_arrow</span></button>
            <button id="btn-full-next" class="icon-button"><span class="material-symbols-outlined"
                    style="font-size: 40px;">skip_next</span></button>
            <div style="width: 32px;"></div> <!-- Spacer -->
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-target="screen-library" id="nav-btn-library">
            <span class="material-symbols-outlined">library_music</span>
            <span class="nav-label">Library</span>
        </button>
        <button class="nav-item" data-target="screen-download" id="nav-btn-download">
            <span class="material-symbols-outlined">cloud_download</span>
            <span class="nav-label">Import</span>
        </button>
        <button class="nav-item" data-target="screen-executor" id="nav-btn-executor">
            <span class="material-symbols-outlined">admin_panel_settings</span>
            <span class="nav-label">Admin</span>
        </button>
    </nav>

    <div id="global-toast" class="hidden"></div>
    <audio id="audio-player" preload="metadata"></audio>

    <script src="app.js"></script>
</body>
<!-- Исправления для Chart и кнопки лайка -->
<script>
    // Дополнительные исправления для Chart
    document.addEventListener('DOMContentLoaded', function () {
        // Исправление для кнопки Chart
        const chartBtn = document.getElementById('btn-play-chart');
        if (chartBtn) {
            const originalClick = chartBtn.onclick;
            chartBtn.onclick = async function (e) {
                const spinner = document.querySelector('.chart-spinner');
                if (spinner) spinner.classList.remove('hidden');

                try {
                    // Принудительно загружаем чарт
                    const response = await fetchWithRetry('https://muzofond.fm/', {}, true);
                    const tracks = parseMuzofondTracks(response);

                    if (tracks.length > 0) {
                        // Перемешиваем и берем 20 треков
                        const shuffled = tracks.sort(() => Math.random() - 0.5).slice(0, 20);

                        // Добавляем флаг isOnline для каждого трека
                        const chartTracks = shuffled.map(track => ({
                            ...track,
                            isOnline: true,
                            isChart: true
                        }));

                        playList(chartTracks, 0);
                        showToast('🎵 Ваш чарт готов');
                    } else {
                        showToast('Чарт временно недоступен');
                    }
                } catch (error) {
                    console.error('Chart error:', error);
                    showToast('Ошибка загрузки чарта');
                } finally {
                    if (spinner) spinner.classList.add('hidden');
                }
            };
        }

        // Улучшенная очистка временных треков
        const audio = document.getElementById('audio-player');
        if (audio) {
            audio.addEventListener('ended', function () {
                if (lastPlayedId && lastPlayedId.startsWith('tmp_')) {
                    deleteTrack(lastPlayedId).catch(() => { });
                }
            });
        }

        // Улучшенная кнопка лайка
        const likeBtn = document.getElementById('btn-full-like');
        if (likeBtn) {
            likeBtn.addEventListener('click', async function () {
                const t = playlist[curIdx];
                if (!t) return;

                if (t.isTemp || (t.id && t.id.startsWith('tmp_'))) {
                    // Сохраняем в библиотеку
                    const newId = 'loc_' + Date.now();
                    const newTrack = {
                        title: t.title,
                        artist: t.artist,
                        filePath: t.filePath,
                        blob: t.blob,
                        id: newId
                    };

                    await saveTrack(newTrack);
                    playlist[curIdx] = newTrack;
                    lastPlayedId = newId;

                    // Обновляем иконку
                    const icon = document.getElementById('icon-full-like');
                    icon.style.color = 'var(--accent-pink)';
                    icon.style.fontVariationSettings = "'FILL' 1";

                    showToast('❤️ Добавлено в библиотеку');
                } else {
                    if (confirm('Удалить из библиотеки?')) {
                        await deleteTrack(t.id);

                        // Продолжаем воспроизведение как временный
                        const tempId = 'tmp_' + Date.now();
                        playlist[curIdx] = {
                            ...t,
                            id: tempId,
                            isTemp: true,
                            blob: t.blob
                        };
                        lastPlayedId = tempId;

                        // Обновляем иконку
                        const icon = document.getElementById('icon-full-like');
                        icon.style.color = '#fff';
                        icon.style.fontVariationSettings = "'FILL' 0";

                        showToast('💔 Удалено из библиотеки');
                    }
                }
            });
        }
    });

    // Функция для парсинга треков с muzofond
    function parseMuzofondTracks(html) {
        const tracks = [];
        const blocks = html.split('<li class="item"');

        for (let i = 1; i < blocks.length; i++) {
            const block = blocks[i];
            const urlMatch = /data-url="([^"]+)"/.exec(block);
            const artistMatch = /<span class="artist">([^<]+)<\/span>/.exec(block);
            const titleMatch = /<span class="track">([^<]+)<\/span>/.exec(block);

            if (urlMatch && artistMatch && titleMatch) {
                tracks.push({
                    id: 'net_' + Math.random().toString(36).slice(2),
                    title: titleMatch[1].trim(),
                    artist: artistMatch[1].trim(),
                    filePath: urlMatch[1],
                    isOnline: true
                });
            }
        }

        return tracks;
    }

    // Переопределяем функцию fetchMuzofond для чарта
    const originalFetchMuzofond = window.fetchMuzofond;
    window.fetchMuzofond = async function (q) {
        try {
            const target = q ? `https://muzofond.fm/search/${encodeURIComponent(q)}` : 'https://muzofond.fm/';
            const html = await fetchWithRetry(target, {}, true);
            return parseMuzofondTracks(html);
        } catch (error) {
            console.error('FetchMuzofond error:', error);
            return [];
        }
    };
</script>
</body>

</html>

</html>
